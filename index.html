<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
   <title>UrbanCart | Premium Store</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
   <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="nav">
      <div class="logo">
         <img src="https://img.freepik.com/free-vector/shopping-web-icon-design-element_460848-8737.jpg?semt=ais_hybrid&w=740&q=80" alt="UrbanCart logo">
         <span>URBANCART</span>
         <i class="fa-solid fa-bars" id="menuIcon"></i>
      </div>
      <ol class="list" id="navList">
         <li><a href="#"><i class="fa-solid fa-house"></i> Home</a></li>
         <li><a href="#"><i class="fa-regular fa-compass"></i> Explore</a></li>
         <li><a href="#"><i class="fa-regular fa-heart"></i> Wishlist</a></li>
         <li><a href="#"><i class="fa-regular fa-user"></i> Login</a></li>
         <li><a href="#"><i class="fa-solid fa-user-plus"></i> Register</a></li>
      </ol>
   </div>

   <div class="hero" id="productGrid"></div>

   <footer class="footer">
      <div class="footer-content">
         <div class="social-icons">
            <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
            <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" aria-label="Github"><i class="fab fa-github"></i></a>
         </div>
         <p>© 2025 UrbanCart — premium essentials. All styles reserved.</p>
         <p style="font-size: 0.75rem;">✨ Free shipping on orders above ₹999 ✨</p>
      </div>
   </footer>

   <div class="toast-msg" id="toastMsg"><i class="fa-solid fa-circle-check"></i> added to cart</div>

   <script src="script.js"></script>
</body>
</html>
